# Test stage : pytest unit + integration (testcontainers)

.uv-base: &uv-base
  image: ghcr.io/astral-sh/uv:python3.14-bookworm-slim
  tags:
    - macbook-local
  before_script:
    - uv sync --all-extras --frozen
  cache:
    key:
      files:
        - uv.lock
    paths:
      - .venv/

unit-tests:
  <<: *uv-base
  stage: test
  script:
    - uv run pytest tests/unit -v --junitxml=junit-unit.xml --cov=iris_service --cov-report=xml
  artifacts:
    when: always
    reports:
      junit: junit-unit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 30 days

# Note : the import-linter job lives in .gitlab-ci/lint.yml — it shares
# the .uv-base anchor there + has cleaner stage/needs wiring. Don't
# re-define it here.

# Microbenchmarks — JMH equivalent (mirror Java side's perf gates).
# Per ADR-0007 §13. Hot paths : JWT encode/decode + bcrypt hash/verify.
# JSON output uploaded as artifact ; future job can compare across runs
# for delta tracking. Manual on every MR ; main triggers automatically.
benchmarks:
  <<: *uv-base
  stage: test
  needs: []
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: true
  script:
    # --no-cov : benchmarks exercise 6 functions only ; the global --cov-fail-under=90
    # in pyproject.toml addopts would always fail this job.
    - uv run pytest tests/benchmarks --benchmark-only -m benchmarks --benchmark-json=benchmark.json --no-cov
  artifacts:
    when: always
    paths:
      - benchmark.json
    expire_in: 90 days
  allow_failure: true  # informational ; flip to false if regressions become a real risk

integration-tests:
  <<: *uv-base
  stage: test
  needs:
    - unit-tests
  # TODO remove `when: never` by 2026-05-16 — runner dind migration tracked
  # in docs/audit/runner-dind-migration-2026-05-09.md. The macbook-local
  # runner uses docker-socket-binding (volumes=/var/run/docker.sock:...) which
  # silently breaks GitLab `services:` (postgres + kafka containers crash
  # right after start, no logs in the health check). Tried 2026-05-09 without
  # success: network_per_build=true, wait_for_services_timeout=120,
  # privileged=true. Real fix = migrate runner to docker:dind image (no socket
  # binding, services share the dind daemon's network). Until then, the
  # integration-tests job is scope-out (when:never) per CLAUDE.md "(c) Scope-
  # out, not shield" — the test files still live in the repo, they just
  # don't gate the pipeline. Local dev still runs them via testcontainers.
  rules:
    - when: never
  # GitLab `services:` instead of testcontainers per the integration-tests
  # CI flip (TASKS.md 2026-04-29). The macbook-local runner's Docker bridge
  # didn't route from the job container to testcontainers spawned via the
  # host socket (172.17.0.1:NNNN → connection refused, 0/23 green runs
  # 2026-04-27). Services share the job's network namespace + are reachable
  # by alias, no bridge needed. tests/integration/conftest.py auto-detects
  # IRIS_DB__HOST + IRIS_KAFKA_BOOTSTRAP_SERVERS and uses them when set ;
  # local dev still falls back to testcontainers (no env vars).
  services:
    - name: postgres:16.6-alpine
      alias: postgres
    - name: bitnamilegacy/kafka:3.7-debian-12   # Moved from bitnami/* to bitnamilegacy/* early 2026 (Bitnami "freenium" archive). Old ref returns 404 from docker.io.
      alias: kafka
      # Bitnami Kafka 3.x supports KRaft mode (controller + broker in one
      # process — no Zookeeper). Single-broker, single-controller config
      # is enough for integration tests ; production uses 3+ brokers.
      variables:
        KAFKA_CFG_NODE_ID: "0"
        KAFKA_CFG_PROCESS_ROLES: "controller,broker"
        KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
        KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
        KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
        KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
        KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
        ALLOW_PLAINTEXT_LISTENER: "yes"
  variables:
    # Postgres service env vars (consumed by the postgres:16.6-alpine
    # entrypoint to bootstrap the role + db).
    POSTGRES_DB: iris
    POSTGRES_USER: iris
    POSTGRES_PASSWORD: iris
    # IRIS_DB__* : conftest.postgres_url() reads these to assemble the
    # SQLAlchemy URL when running in CI. Local dev (no env) still spawns
    # a testcontainer — the conftest's two-mode design.
    IRIS_DB__HOST: postgres
    IRIS_DB__PORT: "5432"
    IRIS_DB__USER: iris
    IRIS_DB__PASSWORD: iris
    IRIS_DB__NAME: iris
    # IRIS_KAFKA_BOOTSTRAP_SERVERS : conftest.kafka_bootstrap() reads this.
    # Same pattern as the DB — env in CI, testcontainer locally.
    IRIS_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  script:
    # --no-cov : integration tests don't exercise the full app, only
    # adapter paths ; the global --cov-fail-under=90 in pyproject.toml
    # would always fail this job. Coverage is measured by unit-tests.
    - uv run pytest tests/integration -v -m integration --junitxml=junit-integration.xml --no-cov
  artifacts:
    when: always
    reports:
      junit: junit-integration.xml
    expire_in: 30 days
  # allow_failure removed 2026-04-29 : the GitLab services: refactor closed
  # the testcontainers network-bridge issue ; the job is now a real gate.

# Compat matrix : same tests on different Python versions
.compat-base: &compat-base
  stage: compat
  tags:
    - macbook-local
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $RUN_COMPAT == "true"
      when: on_success
    - when: manual
  allow_failure: true
  before_script:
    - uv sync --all-extras --frozen
  script:
    - uv run pytest tests/unit -v

# Compat matrix : 3.14 = default (in unit-tests + integration-tests above) ;
# 3.12 + 3.13 = informational fallbacks. 3.11 dropped 2026-04-25 (less than
# 18 months before EOL = 2027-10) — not worth maintaining.

compat-py312:
  <<: *compat-base
  image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim

compat-py313:
  <<: *compat-base
  image: ghcr.io/astral-sh/uv:python3.13-bookworm-slim
