# Test stage : pytest unit + integration (testcontainers)

.uv-base: &uv-base
  image: ghcr.io/astral-sh/uv:python3.14-bookworm-slim
  tags:
    - macbook-local
  before_script:
    - uv sync --all-extras --frozen
  cache:
    key:
      files:
        - uv.lock
    paths:
      - .venv/

unit-tests:
  <<: *uv-base
  stage: test
  script:
    - uv run pytest tests/unit -v --junitxml=junit-unit.xml --cov=iris_service --cov-report=xml
  artifacts:
    when: always
    reports:
      junit: junit-unit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 30 days

# Note : the import-linter job lives in .gitlab-ci/lint.yml — it shares
# the .uv-base anchor there + has cleaner stage/needs wiring. Don't
# re-define it here.

# Mutation testing on auth (jwt + passwords) — manual gate, mirrors
# Java's PIT mutation report. Targeted at security-critical paths only
# (auth/jwt + auth/passwords) because full-suite mutmut is 30-60 min
# vs ~3-5 min on the auth slice.
#
# Why manual instead of MR-gating : mutmut 3.x has a quirk where it
# walks the parent FS on `run` start ; on macOS this hits unreadable
# system files (`.VolumeIcon.icns`) and aborts. The Linux Docker image
# below avoids that — but keeping the job as `when: manual` means
# regular MRs aren't gated on a 5-minute mutation pass that's only
# meaningful when auth code actually changed.
#
# When to trigger : after touching anything under `src/iris_service/auth/`.
# The manual button on the MR pipeline runs targeted mutations + posts
# the surviving-mutant report as an artifact for review.
mutation-test:
  <<: *uv-base
  stage: test
  needs:
    - unit-tests
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - "src/iris_service/auth/**/*"
        - "tests/unit/auth/**/*"
        - "pyproject.toml"
      when: manual
      allow_failure: true
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "src/iris_service/auth/**/*"
        - "tests/unit/auth/**/*"
        - "pyproject.toml"
      when: manual
      allow_failure: true
  script:
    # Linux container : the macOS `.VolumeIcon.icns` issue doesn't apply
    # (no `/Volumes` to walk). uv run mutmut works as documented.
    - uv run mutmut run --no-progress 2>&1 | tail -50
    # Always render the surviving-mutant table even if `mutmut run` exits
    # non-zero (which it does whenever any mutant survives). The table is
    # the actual deliverable — exit code is informational.
    - uv run mutmut results > mutmut-results.txt 2>&1 || true
    - cat mutmut-results.txt
  artifacts:
    when: always
    paths:
      - mutmut-results.txt
      - .mutmut-cache/
    expire_in: 30 days
  allow_failure: true  # opt-in tool ; surviving mutants tracked as backlog, not gate

# Microbenchmarks — JMH equivalent (mirror Java side's perf gates).
# Per ADR-0007 §13. Hot paths : JWT encode/decode + bcrypt hash/verify.
# JSON output uploaded as artifact ; future job can compare across runs
# for delta tracking. Manual on every MR ; main triggers automatically.
benchmarks:
  <<: *uv-base
  stage: test
  needs: []
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: true
  script:
    # --no-cov : benchmarks exercise 6 functions only ; the global --cov-fail-under=90
    # in pyproject.toml addopts would always fail this job.
    - uv run pytest tests/benchmarks --benchmark-only -m benchmarks --benchmark-json=benchmark.json --no-cov
  artifacts:
    when: always
    paths:
      - benchmark.json
    expire_in: 90 days
  allow_failure: true  # informational ; flip to false if regressions become a real risk

integration-tests:
  <<: *uv-base
  # 2026-05-10 attempt 3 : route to SaaS Linux runner. The macbook-local-dind
  # runner spawned services that started but the health check could not connect
  # (postgres + kafka, network bridge issue between service container and
  # health check container despite network_per_build + privileged). Mac
  # Docker arm64 + GitLab Runner services seems incompatible. SaaS runners
  # use Linux amd64 native with first-class services support — accept the
  # CLAUDE.md "use local runners" trade-off for this single integration job.
  # Free tier provides ~400min/month, sufficient for this 1-3min job per MR.
  tags:
    - saas-linux-medium-amd64
  stage: test
  needs:
    - unit-tests
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  # GitLab `services:` instead of testcontainers per the integration-tests
  # CI flip (TASKS.md 2026-04-29). The macbook-local runner's Docker bridge
  # didn't route from the job container to testcontainers spawned via the
  # host socket (172.17.0.1:NNNN → connection refused, 0/23 green runs
  # 2026-04-27). Services share the job's network namespace + are reachable
  # by alias, no bridge needed. tests/integration/conftest.py auto-detects
  # IRIS_DB__HOST + IRIS_KAFKA_BOOTSTRAP_SERVERS and uses them when set ;
  # local dev still falls back to testcontainers (no env vars).
  services:
    - name: postgres:16.6-alpine
      alias: postgres
    # Redpanda (kafka-API compatible) instead of bitnamilegacy/kafka — Apache
    # Kafka KRaft mode boots > 30s (cluster bootstrap + log dir formatting),
    # which exceeds the GitLab CI default service health check timeout (30s)
    # AND `wait_for_services_timeout` does not propagate to SaaS runners.
    # Redpanda is a wire-protocol-compatible Kafka broker written in C++ that
    # boots in ~3-5s. The aiokafka client connects unchanged via kafka:9092.
    # Tested 2026-05-10 after kafka KRaft timed out on macbook-local-dind +
    # SaaS runners. See docs/audit/kafka-ci-redpanda-switch-2026-05-10.md.
    - name: redpandadata/redpanda:v24.2.10
      alias: kafka
      command:
        - redpanda
        - start
        - --kafka-addr=PLAINTEXT://0.0.0.0:9092
        - --advertise-kafka-addr=PLAINTEXT://kafka:9092
        - --smp=1
        - --memory=512M
        - --reserve-memory=0M
        - --node-id=0
        - --check=false
        - --mode=dev-container
  variables:
    # Postgres service env vars (consumed by the postgres:16.6-alpine
    # entrypoint to bootstrap the role + db).
    POSTGRES_DB: iris
    POSTGRES_USER: iris
    POSTGRES_PASSWORD: iris
    # IRIS_DB__* : conftest.postgres_url() reads these to assemble the
    # SQLAlchemy URL when running in CI. Local dev (no env) still spawns
    # a testcontainer — the conftest's two-mode design.
    IRIS_DB__HOST: postgres
    IRIS_DB__PORT: "5432"
    IRIS_DB__USER: iris
    IRIS_DB__PASSWORD: iris
    IRIS_DB__NAME: iris
    # IRIS_KAFKA_BOOTSTRAP_SERVERS : conftest.kafka_bootstrap() reads this.
    # Same pattern as the DB — env in CI, testcontainer locally.
    IRIS_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  script:
    # --no-cov : integration tests don't exercise the full app, only
    # adapter paths ; the global --cov-fail-under=90 in pyproject.toml
    # would always fail this job. Coverage is measured by unit-tests.
    - uv run pytest tests/integration -v -m integration --junitxml=junit-integration.xml --no-cov
  artifacts:
    when: always
    reports:
      junit: junit-integration.xml
    expire_in: 30 days
  # allow_failure removed 2026-04-29 : the GitLab services: refactor closed
  # the testcontainers network-bridge issue ; the job is now a real gate.

# Compat matrix : same tests on different Python versions
.compat-base: &compat-base
  stage: compat
  tags:
    - macbook-local
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $RUN_COMPAT == "true"
      when: on_success
    - when: manual
  allow_failure: true
  before_script:
    - uv sync --all-extras --frozen
  script:
    - uv run pytest tests/unit -v

# Compat matrix : 3.14 = default (in unit-tests + integration-tests above) ;
# 3.12 + 3.13 = informational fallbacks. 3.11 dropped 2026-04-25 (less than
# 18 months before EOL = 2027-10) — not worth maintaining.

compat-py312:
  <<: *compat-base
  image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim

compat-py313:
  <<: *compat-base
  image: ghcr.io/astral-sh/uv:python3.13-bookworm-slim
