# Docs stage : mkdocs-material build + GitLab Pages publish
#
# Mirror of UI's compodoc + svc's javadoc generation. Static site at
# https://iris-7.gitlab.io/iris-service-python/ updated on every
# main push. PR builds run mkdocs build but don't publish.

pages:
  stage: deploy
  image: ghcr.io/astral-sh/uv:python3.14-bookworm-slim
  tags:
    - macbook-local
  needs:
    - unit-tests
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    - uv sync --all-extras --frozen
  script:
    - uv run mkdocs build --site-dir public
  artifacts:
    paths:
      - public
    expire_in: 30 days
  environment:
    name: docs
    url: https://iris-7.gitlab.io/iris-service-python/
  allow_failure: true  # docs failure doesn't gate pipeline

docs:check:
  stage: validate
  image: ghcr.io/astral-sh/uv:python3.14-bookworm-slim
  tags:
    - macbook-local
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "docs/**/*"
        - "mkdocs.yml"
        - "src/**/*.py"  # docstrings drive autodoc
  before_script:
    - uv sync --all-extras --frozen
  script:
    - uv run mkdocs build --strict
  # mkdocs --strict trips on broken-link warnings — informational on
  # MR pipelines (mirrors the `pages:` job's allow_failure shield at
  # line 27). Per ADR-0049 : a broken link in docs shouldn't gate the
  # MR ; reviewers see the warning and can re-MR a fix.
  allow_failure: true
