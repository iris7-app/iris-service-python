name: integration-tests

# Mirror of the GitLab CI `integration-tests` job that doesn't work
# reliably on the macbook-local runner (services don't start properly,
# discovered 2026-05-09). GitHub Actions runs on Linux amd64 native
# with first-class services support.
#
# Free tier covers ~2000 min/month for public repos — sufficient for
# integration-tests on every push.
#
# Local dev still uses testcontainers via tests/integration/conftest.py
# auto-detection (no env vars set → testcontainers ; env vars set → use
# them).

on:
  push:
    branches: [main, dev]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/integration-tests.yml"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/integration-tests.yml"

concurrency:
  group: integration-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.6-alpine
        env:
          POSTGRES_DB: iris
          POSTGRES_USER: iris
          POSTGRES_PASSWORD: iris
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      kafka:
        image: bitnamilegacy/kafka:3.7-debian-12
        env:
          KAFKA_CFG_NODE_ID: "0"
          KAFKA_CFG_PROCESS_ROLES: "controller,broker"
          KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
          KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
          KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
          KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
          KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
          ALLOW_PLAINTEXT_LISTENER: "yes"
        ports:
          - 9092:9092
        # Long retries because kafka KRaft bootstrap is slow (>30s on cold
        # start). On GitLab CI same image timed out at default 30s and
        # forced a switch to redpanda (cf. docs/audit/kafka-ci-redpanda-switch).
        # Here on GH Actions we have flexible healthchecks so kafka works.
        options: >-
          --health-cmd "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 20
    env:
      IRIS_DB__HOST: postgres
      IRIS_DB__PORT: "5432"
      IRIS_DB__USER: iris
      IRIS_DB__PASSWORD: iris
      IRIS_DB__NAME: iris
      IRIS_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.2"
      - name: uv sync
        run: uv sync --all-extras --frozen
      - name: integration-tests
        run: uv run pytest tests/integration -v -m integration --junitxml=junit-integration.xml --no-cov
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-integration
          path: junit-integration.xml
          retention-days: 30
