apiVersion: v1
kind: ConfigMap
metadata:
  name: iris-service-python-config
  namespace: mirador
  labels:
    app.kubernetes.io/name: iris-service-python
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: mirador
data:
  # Server
  IRIS_SERVER_HOST: "0.0.0.0"
  IRIS_SERVER_PORT: "8080"
  IRIS_DEV_MODE: "false"

  # Database (host overridden per overlay — base assumes in-cluster postgres)
  IRIS_DB__HOST: "postgres.mirador.svc.cluster.local"
  IRIS_DB__PORT: "5432"
  IRIS_DB__NAME: "mirador"
  IRIS_DB__USER: "mirador"
  # IRIS_DB__PASSWORD lives in the Secret, NOT here

  # Redis
  IRIS_REDIS__HOST: "redis.mirador.svc.cluster.local"
  IRIS_REDIS__PORT: "6379"
  IRIS_REDIS__DB: "0"

  # Kafka
  IRIS_KAFKA__BOOTSTRAP_SERVERS: "kafka.mirador.svc.cluster.local:9092"
  IRIS_KAFKA__CUSTOMER_REQUEST_TOPIC: "customer.enrich.request"
  IRIS_KAFKA__CUSTOMER_REPLY_TOPIC: "customer.enrich.reply"
  IRIS_KAFKA__ENRICH_TIMEOUT_SECONDS: "5"

  # JWT
  # IRIS_JWT__SECRET lives in the Secret, NOT here
  IRIS_JWT__ALGORITHM: "HS256"
  IRIS_JWT__ACCESS_TOKEN_EXPIRE_MINUTES: "15"
  IRIS_JWT__REFRESH_TOKEN_EXPIRE_DAYS: "30"

  # Observability — OTLP HTTP endpoint to the LGTM Collector in the cluster
  IRIS_OTEL_ENDPOINT: "http://otel-collector.observability.svc.cluster.local:4318"
  IRIS_OTEL_SERVICE_NAME: "iris-service-python"
